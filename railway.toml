# Railway deployment configuration for ponto-eletronico

[build]
# Usar Dockerfile customizado para build otimizado
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# Alternativamente, usar nixpacks com Node.js 20:
# builder = "nixpacks"
# nodeVersion = "20"

[deploy]
startCommand = "npm start"
restartPolicyMaxRetries = 5
restartPolicyWindowSeconds = 60
healthchecks = { cpu = false, memory = false }

[env]
# Garantir que npm usa --ci em produção
NPM_CONFIG_PRODUCTION = "true"

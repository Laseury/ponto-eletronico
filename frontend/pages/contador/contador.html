<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VISO Hotel — Contador</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
<div class="pagina-dashboard">
    <div class="sidebar">
        <div class="sidebar-logo">
            <h2 class="logo-nome">VISO</h2>
            <p class="logo-sub">Ponto Eletrônico</p>
        </div>
        <nav class="menu">
            <a class="menu-item active" href="contador.html">Relatório</a>
        </nav>
    </div>

    <div class="conteudo">
        <div class="topbar">
            <span id="topbar-titulo">Relatório — Contador</span>
            <div style="display:flex;align-items:center;gap:10px">
                <span id="topbar-usuario"
                      style="font-size:13px;color:#5a6070;margin-right:4px"></span>
                <select id="sel-mes" class="sel-mes-ano" onchange="mudarFiltro()">
                    <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                    <option value="3">Março</option><option value="4">Abril</option>
                    <option value="5">Maio</option><option value="6">Junho</option>
                    <option value="7">Julho</option><option value="8">Agosto</option>
                    <option value="9">Setembro</option><option value="10">Outubro</option>
                    <option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
                <select id="sel-ano" class="sel-mes-ano" onchange="mudarFiltro()"></select>
                <div style="display:flex;align-items:center;gap:6px">
                    <label style="color:#9399a6;font-size:13px">R$/h:</label>
                    <input id="inp-valor-hora" type="number" step="0.01"
                           placeholder="0.00" class="inp-valor-hora"
                           onchange="mudarFiltro()">
                </div>
                <button class="botao-exportar" onclick="exportar('xlsx')">⬇ Excel</button>
                <button class="botao-exportar" onclick="exportar('csv')">⬇ CSV</button>
                <button class="botao-logout" onclick="sair()">Sair</button>
            </div>
        </div>

        <div class="conteudo">
            <!-- Cards resumo — somente leitura -->
            <div class="cards" style="margin-bottom:0">
                <div class="card">
                    <p class="card-label">Funcionários</p>
                    <p class="card-valor" id="card-funcionarios">—</p>
                </div>
                <div class="card">
                    <p class="card-label">Extras no Mês</p>
                    <p class="card-valor" id="card-extras">—</p>
                </div>
                <div class="card">
                    <p class="card-label">Faltas no Mês</p>
                    <p class="card-valor" id="card-faltas">—</p>
                </div>
            </div>

            <div class="toolbar">
                <span id="toolbar-titulo">Resumo</span>
            </div>
            <div id="tabela-relatorio"></div>
        </div>
    </div>
</div>

<script src="../../../js/auth.js"></script>
<script>guardarPagina("contador");</script>
<script src="../../../js/ano-seletor.js"></script>
<script src="../../../js/relatorio.js"></script>
<script>
    // Carrega os cards do resumo
    function carregarCards() {
        const mes = parseInt(document.getElementById("sel-mes").value);
        const ano = parseInt(document.getElementById("sel-ano").value);
        fetch(`http://localhost:3000/resumo/${mes}/${ano}`)
            .then(r => r.json())
            .then(function(d) {
                document.getElementById("card-funcionarios").textContent = d.total_funcionarios;
                document.getElementById("card-extras").textContent       = d.total_extras;
                document.getElementById("card-faltas").textContent       = d.total_faltas;
            });
    }

    // Sobrescreve mudarFiltro para também recarregar os cards
    const _mudarFiltroOriginal = mudarFiltro;
    function mudarFiltro() {
        _mudarFiltroOriginal();
        carregarCards();
    }

    carregarCards();
</script>
</body>
</html>

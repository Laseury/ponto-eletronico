<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VISO Hotel — Contador</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
<div class="pagina-dashboard">
    <div class="sidebar">
        <div class="sidebar-logo">
            <h2 class="logo-nome">VISO</h2>
            <p class="logo-sub">Ponto Eletrônico</p>
        </div>
        <nav class="menu">
            <a class="menu-item active" href="contador.html">Relatório</a>
        </nav>
    </div>

    <div class="conteudo">
        <div class="topbar">
            <span id="topbar-titulo">Relatório para Contabilidade</span>
            <div style="display:flex;align-items:center;gap:10px">
                <select id="sel-mes" class="sel-mes-ano" onchange="mudarFiltro()">
                    <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                    <option value="3">Março</option><option value="4">Abril</option>
                    <option value="5">Maio</option><option value="6">Junho</option>
                    <option value="7">Julho</option><option value="8">Agosto</option>
                    <option value="9">Setembro</option><option value="10">Outubro</option>
                    <option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
                <select id="sel-ano" class="sel-mes-ano" onchange="mudarFiltro()"></select>
                <button class="botao-logout" onclick="sair()">Sair</button>
            </div>
        </div>

        <div class="conteudo-lista">
            <div class="cards" style="margin-bottom: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div class="card">
                    <p class="card-label">Total Colaboradores</p>
                    <p class="card-valor" id="card-funcionarios" style="font-size: 28px;">—</p>
                </div>
                <div class="card">
                    <p class="card-label">Saldo de Extras (+)</p>
                    <p class="card-valor verde" id="card-extras" style="font-size: 28px;">—</p>
                </div>
                <div class="card">
                    <p class="card-label">Total de Faltas</p>
                    <p class="card-valor vermelho" id="card-faltas" style="font-size: 28px;">—</p>
                </div>
            </div>

            <div class="toolbar" style="background: rgba(0,0,0,0.05); border-radius: 8px; padding: 16px; margin-bottom: 20px;">
                <span style="font-weight: 700; color: var(--ouro);">Resumo Consolidado do Mês</span>
                <p style="font-size: 11px; color: #5a6070; margin-top: 4px;">Utilize os dados abaixo para o lançamento no sistema de folha de pagamento.</p>
            </div>
            
            <div id="tabela-relatorio" class="container-tabela"></div>
        </div>
    </div>
</div>

<script src="contador.js"></script>
</body>
</html>

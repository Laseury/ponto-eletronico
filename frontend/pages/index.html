<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>VISO Hotel - Ponto Eletrônico</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="pagina-login">
        <div class="caixa-login">
            <h1 class="titulo">VISO HOTEL</h1>
            <p class="subtitulo">Sistema de Ponto Eletrônico</p>

            <div class="campo">
                <label class="rotulo">Usuário</label>
                <input class="entrada" type="text" id="campo-usuario">
            </div>

            <div class="campo">
                <label class="rotulo">Senha</label>
                <input class="entrada" type="password" id="campo-senha">
            </div>

            <button class="botao-entrar" onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // ✅ Login pelo Enter
        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") fazerLogin();
        });
    </script>
</body>
</html>

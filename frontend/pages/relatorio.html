<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISO HOTEL — Relatório Mensal</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="pagina-dashboard">
      <div class="sidebar">
        <div class="sidebar-logo">
          <h2 class="logo-nome">VISO</h2>
          <p class="logo-sub">Ponto Eletrônico</p>
        </div>
        <nav class="menu">
          <a class="menu-item" href="dashboard.html">Dashboard</a>
          <a class="menu-item" href="lancamento.html">Lançamentos</a>
          <a class="menu-item" href="cadastro.html">Funcionários</a>
          <a class="menu-item active" href="relatorio.html">Relatórios</a>
          <a class="menu-item" href="logs.html">Logs</a>
        </nav>
      </div>

      <div class="conteudo">
        <div class="topbar">
          <!-- ✅ id para o JS atualizar com o mês/ano escolhido -->
          <p class="topbar-titulo" id="topbar-titulo">Relatório Mensal</p>
          <div style="display: flex; align-items: center; gap: 6px">
            <label style="color: #9399a6; font-size: 13px">R$/h:</label>
            <input
              id="inp-valor-hora"
              type="number"
              step="0.01"
              placeholder="0.00"
              class="inp-valor-hora"
              onchange="mudarFiltro()"
            />
          </div>

          <div style="display: flex; align-items: center; gap: 10px">
            <select id="sel-mes" class="sel-mes-ano" onchange="mudarFiltro()">
              <option value="1">Janeiro</option>
              <option value="2">Fevereiro</option>
              <option value="3">Março</option>
              <option value="4">Abril</option>
              <option value="5">Maio</option>
              <option value="6">Junho</option>
              <option value="7">Julho</option>
              <option value="8">Agosto</option>
              <option value="9">Setembro</option>
              <option value="10">Outubro</option>
              <option value="11">Novembro</option>
              <option value="12">Dezembro</option>
            </select>
            <select id="sel-ano" class="sel-mes-ano" onchange="mudarFiltro()">
              <option value="2024">2024</option>
              <option value="2025">2025</option>
              <option value="2026">2026</option>
            </select>
          </div>
        </div>

        <div style="padding: 28px 32px">
          <div class="table-wrap">
            <div class="table-toolbar">
              <!-- ✅ id para o JS atualizar o subtítulo -->
              <p
                style="font-size: 13px; font-weight: 600; color: #e8e9ec"
                id="toolbar-titulo"
              >
                Resumo do Mês
              </p>
              <button class="botao-exportar" onclick="exportar('xlsx')">
                ⬇ Excel
              </button>
              <button class="botao-exportar" onclick="exportar('csv')">
                ⬇ CSV
              </button>
            </div>

            <div id="tabela-relatorio">
              <p style="color: #5a6070; font-size: 13px; padding: 20px">
                Carregando...
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../../js/ano-seletor.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      guardarPagina("admin", "gestor");
    </script>
    <script src="../js/relatorio.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>VISO Hotel — Lançar Ponto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pagina-dashboard">

        <div class="sidebar">
            <div class="sidebar-logo">
                <h2 class="logo-nome">VISO</h2>
                <p class="logo-sub">Ponto Eletrônico</p>
            </div>
            <nav class="menu">
                <a class="menu-item" href="dashboard.html">Dashboard</a>
                <a class="menu-item ativo" href="#">Lançar Ponto</a>
                <a class="menu-item" href="#">Relatórios</a>
            </nav>
        </div>

        <div class="conteudo">

            <div class="topbar">
                <p class="topbar-titulo">Lançar Ponto</p>
                <a href="dashboard.html"
                   style="color:#9399a6;font-size:13px;text-decoration:none">
                   ← Voltar
                </a>
            </div>

            <div style="padding: 28px 32px">
                <div class="form-card">

                    <div class="form-grupo">
                        <label class="rotulo">Funcionário</label>
                        <select class="entrada" id="campo-funcionario">
                            <option value="">Selecione...</option>
                        </select>
                    </div>

                    <div class="form-grupo">
                        <label class="rotulo">Data</label>
                        <input class="entrada" type="date" id="campo-data">
                    </div>

                    <div class="form-grupo">
                        <label class="rotulo">Evento (deixe vazio para registrar horários)</label>
                        <select class="entrada" id="campo-evento">
                            <option value="">— Dia normal —</option>
                            <option value="Folga">Folga</option>
                            <option value="Folga Banco">Folga Banco</option>
                            <option value="DSR">DSR</option>
                            <option value="Falta">Falta</option>
                            <option value="Atestado">Atestado</option>
                            <option value="Compensado">Compensado</option>
                        </select>
                    </div>

                    <div id="secao-horarios">

                        <div class="turno-secao">
                            <p class="turno-label">Turno 1</p>
                            <div class="turno-grid">
                                <div class="form-grupo">
                                    <label class="rotulo">Entrada 1</label>
                                    <input class="entrada" type="time" id="e1">
                                </div>
                                <div class="form-grupo">
                                    <label class="rotulo">Saída 1</label>
                                    <input class="entrada" type="time" id="s1">
                                </div>
                            </div>
                        </div>

                        <div class="turno-secao">
                            <p class="turno-label">Turno 2 <span style="color:#5a6070;font-size:11px">(opcional)</span></p>
                            <div class="turno-grid">
                                <div class="form-grupo">
                                    <label class="rotulo">Entrada 2</label>
                                    <input class="entrada" type="time" id="e2">
                                </div>
                                <div class="form-grupo">
                                    <label class="rotulo">Saída 2</label>
                                    <input class="entrada" type="time" id="s2">
                                </div>
                            </div>
                        </div>

                        <div class="turno-secao">
                            <p class="turno-label">Turno 3 <span style="color:#5a6070;font-size:11px">(opcional)</span></p>
                            <div class="turno-grid">
                                <div class="form-grupo">
                                    <label class="rotulo">Entrada 3</label>
                                    <input class="entrada" type="time" id="e3">
                                </div>
                                <div class="form-grupo">
                                    <label class="rotulo">Saída 3</label>
                                    <input class="entrada" type="time" id="s3">
                                </div>
                            </div>
                        </div>

                    </div><!-- fecha secao-horarios -->

                    <div id="mensagem"></div>

                    <button class="botao-entrar"
                            style="width:auto;padding:10px 28px;margin-top:8px"
                            onclick="lancarPonto()">
                        Salvar Registro
                    </button>

                </div><!-- fecha form-card -->
            </div>

        </div><!-- fecha conteudo -->

    </div><!-- fecha pagina-dashboard -->

    <script src="lancamento.js"></script>
</body>
</html>
